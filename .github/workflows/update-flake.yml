name: Update flake

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-flake
  cancel-in-progress: false

jobs:
  lock:
    # Update the lock file and publish it as an artifact. Kept small so the two
    # long build jobs below can start in parallel as soon as the lock is ready.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update lock file
        run: nix flake update

      - name: Upload updated lock
        uses: actions/upload-artifact@v7.0.1
        with:
          name: flake-lock
          path: flake.lock
          if-no-files-found: error

  x86:
    # Verify the x86_64 (laptop/QEMU) tests against the UPDATED lock.
    needs: lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Use updated lock
        uses: actions/download-artifact@v7
        with:
          name: flake-lock
          path: .

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build VM image + shared closure (parallel)
        run: nix build -L --max-jobs auto .#qemu-vm

      - name: Build checked QEMU result (VM tests one at a time)
        run: nix build -L --max-jobs 1 .#qemu-plasma-result

  rpi:
    # Verify the aarch64 Raspberry Pi 5 checks against the UPDATED lock, on a
    # GitHub-hosted arm64 runner. Builds the real rpi kernel from source.
    needs: lock
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Use updated lock
        uses: actions/download-artifact@v7
        with:
          name: flake-lock
          path: .

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build Raspberry Pi 5 checks (aarch64 VM tests, real kernel)
        run: nix build -L --max-jobs 1 .#rpi-all-tests

  commit:
    # Only reached if BOTH the x86_64 and aarch64 checks passed.
    needs: [x86, rpi]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Use updated lock
        uses: actions/download-artifact@v7
        with:
          name: flake-lock
          path: .

      - name: Commit updated lock file
        run: |
          if git diff --quiet -- flake.lock; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "update flake lock"
          git push
