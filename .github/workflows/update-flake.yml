name: Update flake

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-flake
  cancel-in-progress: false

jobs:
  lock:
    # Update the lock file and publish it as an artifact. Kept small so the two
    # long build jobs below can start in parallel as soon as the lock is ready.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin every job in this run to the same main commit; the final push
          # then only fast-forwards if main hasn't moved since.
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update lock file
        run: nix flake update

      - name: Upload updated lock
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flake-lock
          path: flake.lock
          if-no-files-found: error

  x86:
    # Verify the x86_64 (laptop/QEMU) tests against the UPDATED lock.
    needs: lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Use updated lock
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build VM image + shared closure (parallel)
        run: nix build -L --max-jobs auto .#qemu-vm

      - name: Run VM tests (per-check eval, built one at a time)
        # NOT .#qemu-plasma-result: instantiating the aggregate forces a
        # ~15 GiB whole-flake eval that OOMs the 16 GiB runner.
        run: make run-tests MAX_JOBS=1

  rpi:
    # Verify the aarch64 Raspberry Pi 5 checks against the UPDATED lock, on a
    # GitHub-hosted arm64 runner. Builds the real rpi kernel from source.
    needs: lock
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Use updated lock
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build Raspberry Pi 5 checks (aarch64 VM tests, real kernel)
        # Per-check eval; the .#rpi-all-tests aggregate would force one big eval.
        run: make run-rpi-tests MAX_JOBS=1

  hosts:
    # Verify each laptop host's check set (lib.checkSets.<host>) against the
    # UPDATED lock, parallel to the generic x86 and rpi jobs. A nixpkgs bump
    # that breaks a host config cannot land. New host = one matrix entry.
    needs: lock
    strategy:
      matrix:
        host: [anya-feher-laptop]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Use updated lock
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Run host checks (per-check eval, built one at a time)
        run: make run-host-tests HOST=${{ matrix.host }} MAX_JOBS=1

  commit:
    # Only reached if the x86_64, aarch64, and per-host checks ALL passed.
    needs: [x86, rpi, hosts]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # Same commit the tests ran against (NOT current main). Credentials
        # stay persisted here: this job pushes.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Use updated lock
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .

      - name: Commit updated lock file
        run: |
          if git diff --quiet -- flake.lock; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "update flake lock"
          # Non-force push from the tested commit: rejected (non-fast-forward)
          # if main moved during the run, so an untested combination never lands.
          git push origin HEAD:main
