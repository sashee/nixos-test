name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  full-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build VM image + shared closure (parallel)
        run: nix build -L --max-jobs auto .#qemu-vm

      - name: Build checked QEMU result (VM tests one at a time)
        run: nix build -L --max-jobs 1 .#qemu-plasma-result

      - name: Upload VM artifacts
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: qemu-plasma-result
          path: |
            result/qemu-command
            result/plasma-desktop.png
            result/firefox-page.png
          if-no-files-found: warn

  rpi:
    # aarch64 Raspberry Pi 5 checks on the real rpi kernel. GitHub-hosted arm64
    # runner (free for public repos). NOTE: the patched rpi kernel is not in any
    # binary cache, so without a cache this job compiles it from source (~1-2h).
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build Raspberry Pi 5 checks (aarch64 VM tests, real kernel)
        run: nix build -L --max-jobs 1 .#checks.aarch64-linux.doh
