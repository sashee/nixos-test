name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  full-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build checked QEMU result
        run: nix build -L --max-jobs 1 .#qemu-plasma-result

      - name: Upload VM artifacts
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: qemu-plasma-result
          path: |
            result/qemu-command
            result/plasma-desktop.png
            result/firefox-page.png
          if-no-files-found: warn
