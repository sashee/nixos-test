name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  full-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Set up host telemetry
        run: |
          # Telemetry streams into the step log because logs are delivered live;
          # artifacts and if:always() steps are lost when the runner VM is killed.
          sudo tee /usr/local/bin/dump-host-state >/dev/null <<'EOF'
          #!/usr/bin/env bash
          echo "=== HOST $(date -u '+%Y-%m-%dT%H:%M:%SZ') load=$(cut -d' ' -f1-3 /proc/loadavg)"
          free -m
          grep -H "" /proc/pressure/memory /proc/pressure/io /proc/pressure/cpu
          df -h / /mnt | tail -n +2
          ps aux --sort=-rss | head -n 5
          echo "IMDS scheduled events: $(curl -s --max-time 5 -H Metadata:true 'http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01' || echo unavailable)"
          EOF
          sudo tee /usr/local/bin/host-telemetry >/dev/null <<'EOF'
          #!/usr/bin/env bash
          vmstat -t 15 &
          sudo journalctl --follow --priority=warning --no-pager &
          while true; do
            dump-host-state
            sleep 15
          done
          EOF
          sudo chmod +x /usr/local/bin/dump-host-state /usr/local/bin/host-telemetry
          # First call to the scheduled-events endpoint can block ~2 min while
          # Azure enables it for this VM; warm it up so later probes are fast.
          curl -s --max-time 120 -H Metadata:true 'http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01' >/dev/null 2>&1 &

      - name: Build VM image + shared closure (parallel)
        run: |
          host-telemetry &
          trap 'echo "=== STEP SIGNALLED at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="; dump-host-state; sudo dmesg | tail -n 100' INT TERM
          nix build -L --max-jobs auto .#qemu-vm &
          wait $!

      - name: Build checked QEMU result (VM tests one at a time)
        run: |
          host-telemetry &
          trap 'echo "=== STEP SIGNALLED at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="; dump-host-state; sudo dmesg | tail -n 100' INT TERM
          nix build -L --max-jobs 1 .#qemu-plasma-result &
          wait $!

      - name: Upload VM artifacts
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: qemu-plasma-result
          path: |
            result/qemu-command
            result/plasma-desktop.png
            result/firefox-page.png
          if-no-files-found: warn

  rpi:
    # aarch64 Raspberry Pi 5 checks on the real rpi kernel. GitHub-hosted arm64
    # runner (free for public repos). NOTE: the patched rpi kernel is not in any
    # binary cache, so without a cache this job compiles it from source (~1-2h).
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Set up host telemetry
        run: |
          # Telemetry streams into the step log because logs are delivered live;
          # artifacts and if:always() steps are lost when the runner VM is killed.
          sudo tee /usr/local/bin/dump-host-state >/dev/null <<'EOF'
          #!/usr/bin/env bash
          echo "=== HOST $(date -u '+%Y-%m-%dT%H:%M:%SZ') load=$(cut -d' ' -f1-3 /proc/loadavg)"
          free -m
          grep -H "" /proc/pressure/memory /proc/pressure/io /proc/pressure/cpu
          df -h / /mnt | tail -n +2
          ps aux --sort=-rss | head -n 5
          echo "IMDS scheduled events: $(curl -s --max-time 5 -H Metadata:true 'http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01' || echo unavailable)"
          EOF
          sudo tee /usr/local/bin/host-telemetry >/dev/null <<'EOF'
          #!/usr/bin/env bash
          vmstat -t 15 &
          sudo journalctl --follow --priority=warning --no-pager &
          while true; do
            dump-host-state
            sleep 15
          done
          EOF
          sudo chmod +x /usr/local/bin/dump-host-state /usr/local/bin/host-telemetry
          # First call to the scheduled-events endpoint can block ~2 min while
          # Azure enables it for this VM; warm it up so later probes are fast.
          curl -s --max-time 120 -H Metadata:true 'http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01' >/dev/null 2>&1 &

      - name: Build Raspberry Pi 5 checks (aarch64 VM tests, real kernel)
        run: |
          host-telemetry &
          trap 'echo "=== STEP SIGNALLED at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="; dump-host-state; sudo dmesg | tail -n 100' INT TERM
          nix build -L --max-jobs 1 .#rpi-all-tests &
          wait $!
