name: CI

on:
  push:
  pull_request:
    # Defaults plus ready_for_review, so marking a draft PR ready starts a
    # fresh run whose payload has draft=false and can reach the automerge job
    # (a run started while draft keeps draft=true in its frozen payload).
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

# Read-only token by default; only the automerge job elevates.
permissions:
  contents: read

jobs:
  full-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job builds incoming flake code; don't leave a token in .git.
          persist-credentials: false

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build VM image + shared closure (parallel)
        run: nix build -L --max-jobs auto .#qemu-vm

      - name: Run VM tests (per-check eval, built one at a time)
        # NOT .#qemu-plasma-result: instantiating that aggregate forces the
        # ~15 GiB whole-flake eval that OOMed the runner. The make target
        # evaluates each check in its own short-lived process instead.
        run: make run-tests MAX_JOBS=1

      - name: Upload VM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: qemu-plasma-result
          path: |
            results/x86_64-linux/plasma-firefox/plasma-desktop.png
            results/x86_64-linux/plasma-firefox/firefox-page.png
          if-no-files-found: warn

  rpi:
    # aarch64 Raspberry Pi 5 checks on the real rpi kernel. GitHub-hosted arm64
    # runner (free for public repos). NOTE: the patched rpi kernel is not in any
    # binary cache, so without a cache this job compiles it from source (~1-2h).
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job builds incoming flake code; don't leave a token in .git.
          persist-credentials: false

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Build + export rpi kernel
        # The kernel is the ~1-2h part and every rpi check reuses it, so build
        # it first: a later test failure still yields the kernel artifact.
        run: make export-rpi-kernel MAX_JOBS=1

      - name: Upload rpi kernel cache
        # Downloadable file:// binary cache of the patched rpi kernel closure.
        # Import on a dev machine with `make import-rpi-kernel CACHE=...` to run
        # the rpi checks locally without the emulated kernel compile.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpi-kernel-cache
          path: rpi-kernel-cache

      - name: Build Raspberry Pi 5 checks (aarch64 VM tests, real kernel)
        # Per-check eval so the evaluator's heap stays bounded; building the
        # .#rpi-all-tests aggregate would force one big whole-flake eval.
        run: make run-rpi-tests MAX_JOBS=1

  host-checks:
    # Per-host check sets (lib.checkSets.<host>): each laptop host's tests run
    # against its real config in a job parallel to the generic x86 and rpi
    # suites, like the rpi's own aarch64 set. New host = one matrix entry.
    strategy:
      matrix:
        host: [anya-feher-laptop]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job builds incoming flake code; don't leave a token in .git.
          persist-credentials: false

      - name: Reclaim disk space
        run: |
          # Delete preinstalled toolchains this repo never uses (~25-30 GB on root).
          # || true so a path missing on the arm64 image is not fatal.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Add swap
        run: |
          swapon --show || true
          sudo fallocate -l 8G /mnt/ci-swapfile
          sudo chmod 600 /mnt/ci-swapfile
          sudo mkswap /mnt/ci-swapfile
          sudo swapon /mnt/ci-swapfile
          swapon --show
          free -h
          df -h

      - name: Run host checks (per-check eval, built one at a time)
        run: make run-host-tests HOST=${{ matrix.host }} MAX_JOBS=1

  automerge:
    # DIY auto-merge: main has no branch protection (so update-flake.yml can
    # push to it with the plain GITHUB_TOKEN), which also disables GitHub's
    # native auto-merge. `needs` gives the same semantics: this job only runs
    # when both checks passed. Draft = "don't auto-merge yet". Owner-only so
    # fork PRs (read-only token anyway) are never merged unreviewed.
    needs: [full-build, rpi, host-checks]
    if: >
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Serialize merges: if several PRs go green at once, they merge one at a
    # time and each later one re-checks main (and correctly fails if it moved).
    concurrency:
      group: automerge
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR (only if it matches what CI tested)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          # SHAs the test merge ref was built from. Comparing against them
          # before merging closes the CI-ran-against-stale-code races:
          # BASE_SHA guards main moving under us, --match-head-commit guards
          # a push to the PR branch after tests started (checked atomically
          # by the merge API itself).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          current_main=$(gh api repos/${{ github.repository }}/branches/main --jq .commit.sha)
          if [ "$current_main" != "$BASE_SHA" ]; then
            echo "::error::main moved since CI ran ($BASE_SHA -> $current_main); update the PR branch to re-run CI against current main"
            exit 1
          fi
          gh pr merge "$PR" --rebase --repo ${{ github.repository }} --match-head-commit "$HEAD_SHA"
